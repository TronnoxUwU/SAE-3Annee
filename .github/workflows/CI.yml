name: CI

on:
  push:
    branches:
      - main
      - develop
      - preparation-mise-en-production
  pull_request:
    branches:
      - main
      - develop
      - preparation-mise-en-production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: bourge2028/package-lock.json

      - name: Install dependencies
        working-directory: bourge2028
        run: npm ci

      - name: Build project
        working-directory: bourge2028
        run: npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      