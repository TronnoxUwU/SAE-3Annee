name: CI

on:
  push:
    branches:
      - main
      - develop
      - preparation-mise-en-production
  pull_request:
    branches:
      - main
      - develop
      - preparation-mise-en-production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -f bourge2028/web.dockerfile -t ${{ secrets.DOCKER_USERNAME }}/bourge2028:latest bourge2028

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bourge2028:latest
      